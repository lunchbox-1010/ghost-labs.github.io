<style>

    opacity: .8;

    display: grid;
    place-items: center;
    padding: 24px;
    position: relative;
    isolation: isolate;
  }
  .stage::before {
    content: "";
    position: absolute; inset: 0;

    padding: 56px 44px;

    -webkit-backdrop-filter: blur(24px) saturate(160%);

    border-radius: 20px;
    position: relative;
    text-align: center;
    box-shadow: 0 30px 80px -30px rgba(28, 30, 34, 0.22);
  }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.16em;

    font-weight: 500;
    margin-bottom: 14px;

    text-align: center;
    letter-spacing: 0.06em;

    border-radius: 10px;
  }

    background: #fff;
    border-color: var(--accent);
  }
  input::placeholder {
    color: var(--ink-muted);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-size: 11px;
  }
  .toggle {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: transparent; border: 0;
    color: var(--ink-muted);
    width: 36px; height: 36px;
    cursor: pointer;
    transition: color .2s ease;
    border-radius: 8px;
  }

    padding: 14px 24px;

    font-weight: 500;

  .btn:disabled { opacity: .55; cursor: wait; }
  .msg {
    margin-top: 18px;
    font-size: 13px;
    color: #b04040;
    min-height: 18px;
    letter-spacing: -0.005em;
  }
  .foot {
    margin-top: 32px;
    padding-top: 22px;
    border-top: 1px solid var(--line);
    font-size: 12px;
    color: var(--ink-muted);
    letter-spacing: -0.005em;
    display: flex; justify-content: space-between; align-items: center;
  }

<script>
(() => {
  const payload = JSON.parse(document.getElementById("payload").textContent);
  const pw     = document.getElementById("pw");
  const form   = document.getElementById("gate");
  const submit = document.getElementById("submit");
  const msg    = document.getElementById("msg");
  const toggle = document.getElementById("toggle");

  toggle.addEventListener("click", () => {
    pw.type = pw.type === "password" ? "text" : "password";
    pw.focus();
  });

  setTimeout(() => pw.focus(), 50);

  const hex2buf = (h) => {
    const u = new Uint8Array(h.length / 2);
    for (let i = 0; i < u.length; i++) u[i] = parseInt(h.substr(i*2, 2), 16);
    return u;
  };

  async function decrypt(password) {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      "raw", enc.encode(password), "PBKDF2", false, ["deriveBits"]
    );
    const bits = await crypto.subtle.deriveBits(
      { name: "PBKDF2", salt: hex2buf(payload.salt), iterations: payload.iter, hash: "SHA-256" },
      baseKey, 64 * 8
    );
    const aesKeyRaw = bits.slice(0, 32);
    const macKeyRaw = bits.slice(32, 64);

    const macKey = await crypto.subtle.importKey(
      "raw", macKeyRaw, { name: "HMAC", hash: "SHA-256" }, false, ["verify"]
    );
    const salt = hex2buf(payload.salt);
    const iv   = hex2buf(payload.iv);
    const ct   = hex2buf(payload.ct);
    const data = new Uint8Array(salt.length + iv.length + ct.length);
    data.set(salt, 0); data.set(iv, salt.length); data.set(ct, salt.length + iv.length);
    const ok = await crypto.subtle.verify("HMAC", macKey, hex2buf(payload.mac), data);
    if (!ok) throw new Error("WRONG_PASSWORD");

    const aesKey = await crypto.subtle.importKey(
      "raw", aesKeyRaw, { name: "AES-CBC" }, false, ["decrypt"]
    );
    const plain = await crypto.subtle.decrypt({ name: "AES-CBC", iv }, aesKey, ct);
    return new TextDecoder("utf-8").decode(plain);
  }

  async function unlock(password) {
    submit.disabled = true;
    submit.textContent = "Unlocking…";
    msg.textContent = "";
    try {
      const html = await decrypt(password);
      try { sessionStorage.setItem("cg_pw", password); } catch {}
      document.open();
      document.write(html);
      document.close();
    } catch (e) {
      submit.disabled = false;
      submit.textContent = "Unlock Preview";
      msg.textContent = e.message === "WRONG_PASSWORD"
        ? "Incorrect password. Please try again."
        : "Something went wrong unlocking the page.";
      pw.value = "";
      pw.focus();
    }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    if (!pw.value) return;
    unlock(pw.value);
  });

  try {
    const cached = sessionStorage.getItem("cg_pw");
    if (cached) unlock(cached);
  } catch {}
})();
</script>
