      const iv = b64ToBuf(IV_B64);
      const ct = b64ToBuf(CT_B64);
      const enc = new TextEncoder();
      const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
      const key = await crypto.subtle.deriveKey(
        { name:'PBKDF2', salt, iterations:200000, hash:'SHA-256' },
        km, { name:'AES-GCM', length:256 }, false, ['decrypt']
      );
      const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
      const html = new TextDecoder().decode(pt);
      // remember in session so navigation within preview works
      try { sessionStorage.setItem('gl_pw', pw); } catch(e){}
      // inject decrypted content
      const banner = document.querySelector('.preview-banner').outerHTML;
      document.body.innerHTML = banner + html;
      // re-run any inline scripts in the decrypted content
      document.querySelectorAll('script').forEach(old => {
        if (old.id === 'ct') return;
        const s = document.createElement('script');
        if (old.src) s.src = old.src; else s.textContent = old.textContent;
        old.parentNode.replaceChild(s, old);
      });
    } catch (e) {
      document.getElementById('err').textContent = 'Wrong password.';
    }
  }
  document.getElementById('go').addEventListener('click', () => tryUnlock(document.getElementById('pw').value));
  document.getElementById('pw').addEventListener('keydown', (e) => { if (e.key==='Enter') tryUnlock(e.target.value); });
  // auto-unlock if session password is present
  try {
    const saved = sessionStorage.getItem('gl_pw');
    if (saved) tryUnlock(saved);
  } catch(e){}
})();
</script>
